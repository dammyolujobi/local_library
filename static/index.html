<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafaf9;
      --glass: rgba(255,255,255,0.72);
      --glass-border: rgba(255,255,255,0.55);
      --surface: rgba(255,255,255,0.85);
      --surface-hover: rgba(255,255,255,0.98);
      --text-primary: #1a1a1a;
      --text-secondary: #6e6e73;
      --text-tertiary: #aeaeb2;
      --accent: #0066cc;
      --accent-glow: rgba(0,102,204,0.18);
      --accent-soft: rgba(0,102,204,0.08);
      --border: rgba(0,0,0,0.07);
      --border-strong: rgba(0,0,0,0.12);
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.10), 0 4px 16px rgba(0,0,0,0.06);
      --shadow-xl: 0 32px 80px rgba(0,0,0,0.14);
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 22px;
      --radius-xl: 28px;
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'DM Sans', -apple-system, sans-serif;
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0b;
        --glass: rgba(28,28,30,0.82);
        --glass-border: rgba(255,255,255,0.08);
        --surface: rgba(28,28,30,0.9);
        --surface-hover: rgba(38,38,40,0.98);
        --text-primary: #f5f5f7;
        --text-secondary: #98989d;
        --text-tertiary: #636366;
        --accent: #3a9bff;
        --accent-glow: rgba(58,155,255,0.20);
        --accent-soft: rgba(58,155,255,0.10);
        --border: rgba(255,255,255,0.07);
        --border-strong: rgba(255,255,255,0.14);
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
        --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
        --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
        --shadow-xl: 0 32px 80px rgba(0,0,0,0.6);
      }
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Ambient background orbs */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.28;
      animation: drift 20s ease-in-out infinite;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #a8d4ff 0%, transparent 70%);
      top: -200px; right: -100px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #c7b8f5 0%, transparent 70%);
      bottom: -100px; left: -150px;
      animation-delay: -8s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #b3e8d4 0%, transparent 70%);
      top: 40%; left: 50%;
      animation-delay: -14s;
    }
    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(30px, -40px) scale(1.05); }
      66%       { transform: translate(-20px, 20px) scale(0.97); }
    }

    @media (prefers-color-scheme: dark) {
      .orb { opacity: 0.15; }
    }

    /* Layout */
    .page {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 28px 100px;
    }

    /* Header */
    .header {
      margin-bottom: 64px;
      animation: fadeUp 0.9s var(--ease-out) both;
    }
    .header-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .header-eyebrow::before {
      content: '';
      display: block;
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    .header h1 {
      font-family: var(--font-display);
      font-size: clamp(2.6rem, 6vw, 4.2rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.05;
      margin-bottom: 14px;
      color: var(--text-primary);
    }
    .header h1 em {
      font-style: italic;
      color: var(--text-secondary);
    }
    .header-sub {
      font-size: 1.05rem;
      color: var(--text-secondary);
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    /* Controls Card */
    .controls-card {
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 28px;
      box-shadow: var(--shadow-lg);
      margin-bottom: 32px;
      animation: fadeUp 0.9s var(--ease-out) 0.1s both;
    }

    .controls-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }

    .field-label {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }

    .input-shell {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      display: flex;
      pointer-events: none;
      transition: color 0.2s;
    }
    input[type="text"] {
      width: 100%;
      height: 48px;
      padding: 0 16px 0 42px;
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 0.97rem;
      font-weight: 400;
      color: var(--text-primary);
      transition: all 0.25s var(--ease-out);
      outline: none;
      appearance: none;
    }
    input[type="text"]::placeholder { color: var(--text-tertiary); }
    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
      background: var(--surface);
    }
    input[type="text"]:focus + .input-icon,
    .input-shell:focus-within .input-icon { color: var(--accent); }

    .divider-thin {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 48px;
      padding: 0 22px;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.22s var(--ease-spring);
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.15s;
    }
    .btn:hover::after { background: rgba(255,255,255,0.08); }
    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px var(--accent-glow), 0 1px 3px rgba(0,0,0,0.12);
    }
    .btn-primary:hover {
      box-shadow: 0 4px 20px var(--accent-glow), 0 2px 6px rgba(0,0,0,0.14);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: var(--surface);
      color: var(--text-secondary);
      border: 1px solid var(--border-strong);
    }
    .btn-ghost:hover {
      color: var(--text-primary);
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }

    .btn-icon {
      width: 48px;
      height: 48px;
      padding: 0;
      border-radius: 50%;
    }

    /* Message */
    #messageBox { margin-bottom: 20px; min-height: 0; }
    .message {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 18px;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 400;
      animation: slideDown 0.35s var(--ease-out) both;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .error-message   { background: rgba(255,59,48,0.08); color: #d93025; border: 1px solid rgba(255,59,48,0.16); }
    .success-message { background: rgba(52,199,89,0.08); color: #1e8b3e; border: 1px solid rgba(52,199,89,0.16); }

    @media (prefers-color-scheme: dark) {
      .error-message   { color: #ff6b6b; }
      .success-message { color: #4cd87a; }
    }

    /* Info bar */
    .info-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--accent-soft);
      border: 1px solid rgba(0,102,204,0.14);
      border-radius: var(--radius-md);
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-bottom: 28px;
      animation: fadeUp 0.4s var(--ease-out) both;
    }
    .info-bar.visible { display: flex; }
    .info-bar code {
      font-family: 'SF Mono', 'Fira Mono', monospace;
      font-size: 0.82rem;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 2px 7px;
      border-radius: 5px;
    }
    .info-count {
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Grid */
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 16px;
      animation: fadeUp 0.5s var(--ease-out) 0.15s both;
    }

    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      height: 272px;
      transition: all 0.3s var(--ease-out);
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    .file-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 1;
    }
    .file-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: var(--shadow-xl);
      border-color: var(--border-strong);
    }
    .file-card:hover .thumb-overlay {
      opacity: 1;
    }
    .file-card:active {
      transform: translateY(-3px) scale(0.99);
    }

    .file-card-thumb {
      flex: 1;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .file-card-thumb canvas,
    .file-card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--text-tertiary);
    }
    .thumb-placeholder svg {
      width: 36px; height: 36px;
      opacity: 0.4;
    }
    .thumb-placeholder span {
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .thumb-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.25) 100%);
      opacity: 0;
      transition: opacity 0.25s;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 12px;
      z-index: 2;
    }
    .open-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.76rem;
      font-weight: 500;
      background: rgba(255,255,255,0.92);
      color: #1a1a1a;
      padding: 5px 12px;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .file-card-info {
      padding: 12px 14px 14px;
      flex-shrink: 0;
      background: var(--surface);
    }
    .file-card-name {
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--text-primary);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.35;
      letter-spacing: -0.01em;
    }
    .file-ext-badge {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 24px;
      color: var(--text-tertiary);
      text-align: center;
      animation: fadeUp 0.5s var(--ease-out) both;
    }
    .empty-icon {
      width: 64px; height: 64px;
      opacity: 0.25;
      margin-bottom: 18px;
    }
    .empty-state p {
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-secondary);
    }
    .empty-state small {
      font-size: 0.86rem;
      color: var(--text-tertiary);
      margin-top: 6px;
      display: block;
    }

    /* Loading */
    .loading-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 24px;
      gap: 20px;
    }
    .spinner-ring {
      width: 36px; height: 36px;
      border: 2.5px solid var(--border-strong);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p {
      font-size: 0.92rem;
      color: var(--text-tertiary);
      font-weight: 300;
    }

    /* Staggered card entry */
    .file-card {
      opacity: 0;
      transform: translateY(16px);
      animation: cardIn 0.45s var(--ease-out) both;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Fade up */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .page { padding: 48px 18px 80px; }
      .controls-row { grid-template-columns: 1fr; }
      .search-row { grid-template-columns: 1fr auto; }
      .file-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      .file-card { height: 230px; }
    }
  </style>
</head>
<body>

<div class="ambient">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>

<div class="page">

  <header class="header">
    <div class="header-eyebrow">PDF Library</div>
    <h1>Your documents,<br><em>beautifully organised.</em></h1>
    <p class="header-sub">Browse and open PDF files from any folder on your system.</p>
  </header>

  <div id="messageBox"></div>

  <div class="controls-card">
    <div class="controls-row">
      <div>
        <div class="field-label">Folder path</div>
        <div class="input-shell">
          <input type="text" id="folderInput" placeholder="Documents" value="Documents" autocomplete="off">
          <span class="input-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
            </svg>
          </span>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end;padding-bottom:0">
        <button class="btn btn-primary" onclick="loadFiles()">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
          </svg>
          Load
        </button>
        <button class="btn btn-ghost btn-icon" onclick="clearAll()" title="Clear">
          <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="divider-thin"></div>

    <div class="search-row">
      <div class="input-shell">
        <input type="text" id="searchInput" placeholder="Search files…" onkeyup="handleSearch(event)" autocomplete="off">
        <span class="input-icon">
          <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" stroke-width="1.8"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M21 21l-4.35-4.35"/>
          </svg>
        </span>
      </div>
      <button class="btn btn-ghost" onclick="performSearch()" style="gap:6px">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
        </svg>
        Search
      </button>
    </div>
  </div>

  <div id="infoBar" class="info-bar"></div>

  <div id="fileList"></div>

</div>

<script>
  let allFiles = [];
  let currentFolder = '';
  let thumbnailQueue = [];
  let concurrentThumbnailLoads = 0;
  const MAX_CONCURRENT_LOADS = 2; // Limit to 2 concurrent PDF loads

  function loadSavedFolder() {
    const saved = localStorage.getItem('pdflib-folder');
    if (saved) {
      document.getElementById('folderInput').value = saved;
      currentFolder = saved;
      loadFiles();
    }
  }

  async function loadFiles() {
    const folderName = document.getElementById('folderInput').value.trim();
    if (!folderName) { showMessage('Enter a folder name', 'error'); return; }

    localStorage.setItem('pdflib-folder', folderName);
    clearMessage();
    showLoading();
    currentFolder = folderName;

    try {
      const folderRes = await fetch(`/api/get_folder?folder_name=${encodeURIComponent(folderName)}`);
      if (!folderRes.ok) {
        showMessage('Folder not found', 'error');
        document.getElementById('fileList').innerHTML = '';
        hideInfoBar();
        return;
      }

      const folderData = await folderRes.json();
      const folderPath = folderData.Folder;

      const filesRes = await fetch(`/api/get_files?folder_name=${encodeURIComponent(folderName)}`);
      if (!filesRes.ok) {
        showMessage('Could not load files', 'error');
        document.getElementById('fileList').innerHTML = '';
        hideInfoBar();
        return;
      }

      const filesData = await filesRes.json();
      allFiles = filesData.map(filePath => {
        const parts = filePath.replace(/\\/g, '/').split('/');
        return { name: parts[parts.length - 1], path: filePath };
      });

      document.getElementById('searchInput').value = '';
      displayFiles(allFiles);
      showInfoBar(allFiles.length, folderPath);

    } catch (err) {
      showMessage(`Error: ${err.message}`, 'error');
      document.getElementById('fileList').innerHTML = '';
    }
  }

  async function generatePdfThumbnail(filePath, canvasId) {
    try {
      concurrentThumbnailLoads++;
      const pdf = await pdfjsLib.getDocument({
        url: `/api/pdf?file_path=${encodeURIComponent(filePath)}`,
        withCredentials: false
      }).promise;
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 0.8 }); // Reduced from 1.5 for memory efficiency
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: ctx, viewport }).promise;
      
      // Clean up memory by destroying the PDF
      pdf.destroy();
    } catch {
      const canvas = document.getElementById(canvasId);
      if (canvas?.parentElement) {
        canvas.parentElement.innerHTML = `
          <div class="thumb-placeholder">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
            </svg>
            <span>PDF</span>
          </div>`;
      }
    } finally {
      concurrentThumbnailLoads--;
      processNextThumbnail();
    }
  }

  function processNextThumbnail() {
    if (concurrentThumbnailLoads < MAX_CONCURRENT_LOADS && thumbnailQueue.length > 0) {
      const next = thumbnailQueue.shift();
      generatePdfThumbnail(next.path, next.canvasId);
    }
  }

  function displayFiles(files) {
    const list = document.getElementById('fileList');

    if (files.length === 0) {
      list.innerHTML = `
        <div class="file-grid">
          <div class="empty-state">
            <svg class="empty-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2"
                d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
            </svg>
            <p>No PDF files found</p>
            <small>Try a different folder or search term</small>
          </div>
        </div>`;
      return;
    }

    let html = '<div class="file-grid">';
    files.forEach((file, i) => {
      const id = `thumb-${i}`;
      const safePath = file.path.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      html += `
        <div class="file-card" style="animation-delay:${i * 55}ms" onclick="openFile('${safePath}')">
          <div class="file-card-thumb">
            <canvas id="${id}" style="max-width:100%;max-height:100%"></canvas>
            <div class="thumb-overlay">
              <span class="open-chip">
                <svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                </svg>
                Open
              </span>
            </div>
          </div>
          <div class="file-card-info">
            <div class="file-card-name">${escapeHtml(file.name.replace(/\.pdf$/i, ''))}</div>
            <span class="file-ext-badge">PDF</span>
          </div>
        </div>`;
    });
    html += '</div>';
    list.innerHTML = html;

    files.forEach((file, i) => {
      // Queue thumbnail generation with staggered timing to avoid memory spikes
      setTimeout(() => {
        thumbnailQueue.push({ path: file.path, canvasId: `thumb-${i}` });
        processNextThumbnail();
      }, i * 100);
    });
  }

  async function handleSearch(e) {
    const term = document.getElementById('searchInput').value.toLowerCase();
    if (e.key === 'Enter') { await performSearch(); return; }
    if (!term) { displayFiles(allFiles); return; }
    displayFiles(allFiles.filter(f => f.name.toLowerCase().includes(term)));
  }

  async function performSearch() {
    const term = document.getElementById('searchInput').value.trim();
    const folder = document.getElementById('folderInput').value.trim();
    if (!term || !folder) { showMessage('Enter both folder and search term', 'error'); return; }
    clearMessage();
    showLoading();
    try {
      const res = await fetch('/api/search_files', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `search=${encodeURIComponent(term)}&folder_name=${encodeURIComponent(folder)}`
      });
      if (res.ok) { showMessage('Opened matching files', 'success'); loadFiles(); }
      else showMessage('No files found', 'error');
    } catch (err) {
      showMessage(`Error: ${err.message}`, 'error');
    }
  }

  async function openFile(filePath) {
    try {
      const res = await fetch('/api/open-file', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: filePath })
      });
      const data = await res.json();
      if (!res.ok) showMessage(`Error: ${data.error}`, 'error');
    } catch (err) {
      showMessage(`Error: ${err.message}`, 'error');
    }
  }

  function showLoading() {
    document.getElementById('fileList').innerHTML = `
      <div class="file-grid">
        <div class="loading-state">
          <div class="spinner-ring"></div>
          <p>Loading your library…</p>
        </div>
      </div>`;
  }

  function showMessage(text, type) {
    const icon = type === 'error'
      ? `<svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="1.8"/><path stroke-linecap="round" stroke-width="1.8" d="M12 8v4m0 4h.01"/></svg>`
      : `<svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M5 13l4 4L19 7"/></svg>`;
    document.getElementById('messageBox').innerHTML =
      `<div class="message ${type}-message">${icon}${escapeHtml(text)}</div>`;
  }

  function clearMessage() { document.getElementById('messageBox').innerHTML = ''; }

  function showInfoBar(count, path) {
    const bar = document.getElementById('infoBar');
    bar.innerHTML = `<span><span class="info-count">${count} file${count !== 1 ? 's' : ''}</span> in <code>${escapeHtml(path)}</code></span>`;
    bar.classList.add('visible');
  }
  function hideInfoBar() {
    document.getElementById('infoBar').classList.remove('visible');
  }

  function clearAll() {
    document.getElementById('folderInput').value = 'Documents';
    document.getElementById('searchInput').value = '';
    localStorage.setItem('pdflib-folder', 'Documents');
    document.getElementById('fileList').innerHTML = '';
    hideInfoBar();
    clearMessage();
    allFiles = [];
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  window.addEventListener('load', loadSavedFolder);
</script>
</body>
</html>
